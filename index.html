<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gemme Gratis</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e90ff, #00c3ff);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      width: 90%;
      max-width: 400px;
    }

    h1 {
      font-size: 22px;
    }

    button {
      margin-top: 20px;
      padding: 15px;
      width: 100%;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      background: #28a745;
      color: white;
      cursor: pointer;
    }

    button:active {
      background: #1e7e34;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>🎁 Ricevi 5.000 gemme</h1>
    <button onclick="vaiPagina()">Clicca qui</button>
  </div>

  <script>
    function vaiPagina() {
      window.location.href = "suca.html";
    }
  </script>

</body>
</html>
